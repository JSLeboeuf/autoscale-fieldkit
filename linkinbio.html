    <title>AutoScale AI — Link in Bio</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg:          #09090b;
        --surface:     #141417;
        --surface-2:   #1c1c21;
        --border:      #262630;
        --border-2:    #35354a;
        --text:        #f4f4f5;
        --text-2:      #d1d1d8;
        --muted:       #8e8ea0;
        --blue:        #60a5fa;
        --blue-2:      #3b82f6;
        --blue-dim:    rgba(96, 165, 250, 0.08);
        --blue-glow:   rgba(96, 165, 250, 0.22);
        --gold:        #fbbf24;
        --gold-dim:    rgba(251, 191, 36, 0.08);
        --gold-border: rgba(251, 191, 36, 0.25);
        --green:       #4ade80;
        --green-dim:   rgba(74, 222, 128, 0.08);
        --green-glow:  rgba(74, 222, 128, 0.30);
        --green-border:rgba(74, 222, 128, 0.28);
        --radius:      16px;
        --radius-sm:   10px;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color-scheme: dark;
      }

      body {
        font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        max-width: 420px;
        margin: 0 auto;
        padding: 0 20px env(safe-area-inset-bottom, 0px);
        position: relative;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      /* Noise texture */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* Ambient glow top */
      body::after {
        content: '';
        position: fixed;
        top: -120px;
        left: 50%;
        transform: translateX(-50%);
        width: 340px;
        height: 280px;
        background: radial-gradient(ellipse at center, rgba(96, 165, 250, 0.07) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      body > * {
        position: relative;
        z-index: 1;
      }

      /* ── WRAPPER ── */
      .wrapper {
        padding: 28px 0 20px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      /* ── BRAND HEADER ── */
      .brand {
        text-align: center;
        margin-bottom: 20px;
      }

      .brand-logo {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #1e3a5f 0%, #0c1c35 100%);
        border: 1px solid rgba(96, 165, 250, 0.20);
        border-radius: 16px;
        margin: 0 auto 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 24px rgba(96, 165, 250, 0.12);
      }

      .brand-logo svg {
        width: 32px;
        height: 32px;
      }

      .brand-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 26px;
        letter-spacing: 0.06em;
        color: var(--text);
        line-height: 1;
        margin-bottom: 6px;
      }

      .brand-name span {
        color: var(--blue);
      }

      .brand-tagline {
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.01em;
      }

      /* ── SOCIAL PROOF BAR ── */
      .proof-bar {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        background: var(--blue-dim);
        border: 1px solid rgba(96, 165, 250, 0.14);
        border-radius: 8px;
        padding: 9px 16px;
        margin-bottom: 20px;
      }

      .proof-bar .sep {
        color: var(--border-2);
        margin: 0 8px;
      }

      /* ── BUTTONS ── */
      .btn-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 18px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 56px;
        padding: 0 20px;
        border-radius: var(--radius);
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        border: none;
        transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.01em;
      }

      .btn:active {
        transform: scale(0.97);
      }

      /* Hero CTA — Call */
      .btn-call {
        background: linear-gradient(135deg, #166534 0%, #14532d 100%);
        color: #bbf7d0;
        border: 1px solid var(--green-border);
        box-shadow: 0 0 0 0 var(--green-glow), inset 0 1px 0 rgba(255,255,255,0.06);
        animation: pulse-ring 2.8s ease-in-out infinite;
      }

      .btn-call:hover {
        box-shadow: 0 0 28px rgba(74, 222, 128, 0.25), inset 0 1px 0 rgba(255,255,255,0.06);
        transform: translateY(-1px);
      }

      @keyframes pulse-ring {
        0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.0), inset 0 1px 0 rgba(255,255,255,0.06); }
        50%       { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0.0), 0 0 22px rgba(74, 222, 128, 0.30), inset 0 1px 0 rgba(255,255,255,0.06); }
      }

      /* Pitch */
      .btn-pitch {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border-2);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      }

      .btn-pitch:hover {
        border-color: var(--blue);
        box-shadow: 0 0 18px rgba(96, 165, 250, 0.12), inset 0 1px 0 rgba(255,255,255,0.04);
      }

      /* Demo call */
      .btn-demo {
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.12) 0%, rgba(59, 130, 246, 0.08) 100%);
        color: var(--blue);
        border: 1px solid rgba(96, 165, 250, 0.28);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      }

      .btn-demo:hover {
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.18) 0%, rgba(59, 130, 246, 0.13) 100%);
        box-shadow: 0 0 20px rgba(96, 165, 250, 0.16), inset 0 1px 0 rgba(255,255,255,0.04);
      }

      /* Video — Coming Soon */
      .btn-video {
        background: var(--surface);
        color: var(--muted);
        border: 1px solid var(--border);
        cursor: default;
        opacity: 0.6;
      }

      .btn-video:active {
        transform: none;
      }

      .badge-soon {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--gold);
        background: var(--gold-dim);
        border: 1px solid var(--gold-border);
        padding: 3px 8px;
        border-radius: 5px;
        margin-left: 4px;
      }

      /* Get Started — Gold */
      .btn-getstarted {
        background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
        color: #fef3c7;
        border: 1px solid var(--gold-border);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      }

      .btn-getstarted:hover {
        box-shadow: 0 0 22px rgba(251, 191, 36, 0.22), inset 0 1px 0 rgba(255,255,255,0.06);
        transform: translateY(-1px);
      }

      /* Icon wrapper */
      .btn-icon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-label {
        flex: 1;
        text-align: center;
      }

      /* Arrow */
      .btn-arrow {
        flex-shrink: 0;
        opacity: 0.45;
        font-size: 14px;
      }

      /* ── STATS STRIP ── */
      .stats-strip {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 0;
        margin-bottom: 18px;
        overflow: hidden;
      }

      .stat-item {
        flex: 1;
        text-align: center;
        padding: 0 12px;
      }

      .stat-item + .stat-item {
        border-left: 1px solid var(--border);
      }

      .stat-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 17px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.1;
        animation: count-flicker 6s ease-in-out infinite;
      }

      .stat-item:nth-child(2) .stat-value {
        animation-delay: 3s;
      }

      @keyframes count-flicker {
        0%, 90%, 100% { opacity: 1; }
        92%            { opacity: 0.55; }
        94%            { opacity: 1; }
        96%            { opacity: 0.65; }
        98%            { opacity: 1; }
      }

      .stat-label {
        font-size: 10px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.02em;
        margin-top: 2px;
      }

      /* ── FOOTER ── */
      .footer {
        text-align: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        font-weight: 500;
        color: var(--border-2);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
    </style>
  </head>
