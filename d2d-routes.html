<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2D Route Sheet — Portland ME</title>
<style>
  :root { --bg: #0a0a0a; --card: #141414; --border: #222; --accent: #3b82f6; --green: #22c55e; --yellow: #eab308; --red: #ef4444; --text: #e5e5e5; --muted: #737373; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .header { position: sticky; top: 0; z-index: 50; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 20px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .stats { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; }
  .stat strong { color: var(--accent); font-size: 18px; display: block; }
  .filters { padding: 12px 20px; display: flex; gap: 8px; flex-wrap: wrap; position: sticky; top: 110px; z-index: 40; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); }
  .filter-btn { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .list { padding: 8px 20px 100px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 8px; transition: all 0.2s; }
  .card.visited { opacity: 0.5; border-left: 3px solid var(--green); }
  .card.skipped { opacity: 0.4; border-left: 3px solid var(--yellow); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .biz-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .vertical-tag { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .tag-plumbing { background: #1e3a5f; color: #60a5fa; }
  .tag-dental { background: #1a3a2a; color: #4ade80; }
  .tag-medspa { background: #3b1f4a; color: #c084fc; }
  .tag-landscaping { background: #2a3a1a; color: #a3e635; }
  .tag-electrical { background: #3a3a1a; color: #facc15; }
  .tag-chiropractic { background: #1a3a3a; color: #2dd4bf; }
  .tag-auto { background: #3a2a1a; color: #fb923c; }
  .tag-realestate { background: #3a1a2a; color: #f472b6; }
  .tag-roofing { background: #2a2a2a; color: #a8a29e; }
  .tag-veterinary { background: #1a2a3a; color: #38bdf8; }
  .card-details { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .card-details .addr { margin-bottom: 4px; }
  .card-details a { color: var(--accent); text-decoration: none; }
  .card-actions { display: flex; gap: 6px; margin-top: 10px; }
  .action-btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-call { background: #166534; color: #4ade80; }
  .btn-nav { background: #1e3a5f; color: #60a5fa; }
  .btn-visited { background: #1a1a1a; color: var(--green); border: 1px solid #1a3a2a; }
  .btn-skip { background: #1a1a1a; color: var(--yellow); border: 1px solid #2a2a1a; }
  .count-display { font-size: 12px; color: var(--muted); padding: 4px 20px; }
  .search-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text); outline: none; margin-top: 8px; }
  .search-box:focus { border-color: var(--accent); }
  @media (min-width: 768px) {
    .list { max-width: 600px; margin: 0 auto; }
    .header, .filters, .count-display { max-width: 640px; margin-left: auto; margin-right: auto; }
  }
</style>

  {n:"Casco Bay Veterinary Hospital",v:"Veterinary",a:"Portland, ME",p:"(207) 761-8033",w:"cascobayvet.com",note:""},

const tagClass = {
  "Plumbing/HVAC":"tag-plumbing","Dental":"tag-dental","Med Spa":"tag-medspa",
  "Landscaping":"tag-landscaping","Electrical":"tag-electrical","Chiropractic":"tag-chiropractic",
  "Auto Repair":"tag-auto","Real Estate":"tag-realestate","Roofing":"tag-roofing","Veterinary":"tag-veterinary"
};

let state = JSON.parse(localStorage.getItem('d2d-portland') || '{}');
let activeFilter = 'all';
let searchQuery = '';

function saveState() { localStorage.setItem('d2d-portland', JSON.stringify(state)); }

function toggleVisited(i) {
  if (state[i] === 'visited') delete state[i];
  else state[i] = 'visited';
  saveState(); render();
}
function toggleSkipped(i) {
  if (state[i] === 'skipped') delete state[i];
  else state[i] = 'skipped';
  saveState(); render();
}

function filterLeads() {
  searchQuery = document.querySelector('.search-box').value.toLowerCase();
  render();
}

function setFilter(v) {
  activeFilter = v;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.v === v));
  render();
}

function render() {
  const list = document.getElementById('lead-list');
  let html = '';
  let shown = 0;
  const visited = Object.values(state).filter(s => s === 'visited').length;

  leads.forEach((l, i) => {
    if (activeFilter !== 'all' && l.v !== activeFilter) return;
    const searchStr = `${l.n} ${l.a} ${l.v} ${l.note}`.toLowerCase();
    if (searchQuery && !searchStr.includes(searchQuery)) return;
    shown++;
    const st = state[i] || '';
    const tc = tagClass[l.v] || '';
    html += `<div class="card ${st}">
      <div class="card-top">
        <div class="biz-name">${l.n}</div>
        <span class="vertical-tag ${tc}">${l.v}</span>
      </div>
      <div class="card-details">
        <div class="addr">${l.a}</div>
        ${l.p ? `<div><a href="tel:${l.p.replace(/[^+\d]/g,'')}">${l.p}</a></div>` : '<div style="color:#ef4444;font-size:12px">No phone — check website</div>'}
        ${l.w ? `<div><a href="https://${l.w}" target="_blank">${l.w}</a></div>` : ''}
        ${l.note ? `<div style="color:#a3a3a3;font-size:12px;margin-top:2px">${l.note}</div>` : ''}
      </div>
      <div class="card-actions">
        ${l.p ? `<button class="action-btn btn-call" onclick="window.location.href='tel:${l.p.replace(/[^+\d]/g,'')}'">Call</button>` : ''}
        ${l.a && !l.a.includes('(') ? `<button class="action-btn btn-nav" onclick="window.open('https://maps.google.com/maps?q='+encodeURIComponent('${l.a.replace(/'/g,"\\'")}'))">Navigate</button>` : ''}
        <button class="action-btn btn-visited" onclick="toggleVisited(${i})">${st==='visited'?'Undo':'Visited'}</button>
        <button class="action-btn btn-skip" onclick="toggleSkipped(${i})">${st==='skipped'?'Undo':'Skip'}</button>
      </div>
    </div>`;
  });

  list.innerHTML = html;
  document.getElementById('visited-count').textContent = visited;
  document.getElementById('remaining-count').textContent = leads.length - visited;
  document.getElementById('count-display').textContent = `Showing ${shown} of ${leads.length} leads`;
}

// Build filter bar
const verticals = [...new Set(leads.map(l => l.v))];
const bar = document.getElementById('filter-bar');
bar.innerHTML = `<button class="filter-btn active" data-v="all" onclick="setFilter('all')">All (${leads.length})</button>`;
verticals.forEach(v => {
  const count = leads.filter(l => l.v === v).length;
  bar.innerHTML += `<button class="filter-btn" data-v="${v}" onclick="setFilter('${v}')">${v} (${count})</button>`;
});

render();
</script>
